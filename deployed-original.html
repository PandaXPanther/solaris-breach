<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLARIS BREACH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Cinzel', serif;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── TITLE ── */
    .title-block {
      text-align: center;
      margin-bottom: 60px;
      animation: titleRise 2.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes titleRise {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 0.6em;
      color: #c8860a;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0.85;
      animation: fadeIn 3s ease 0.4s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 0.85; }
    }

    .title-main {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: clamp(36px, 7vw, 96px);
      line-height: 0.9;
      background: linear-gradient(
        180deg,
        #fff8e7 0%,
        #f5c842 30%,
        #e8820a 60%,
        #8b2500 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(240,130,10,0.7)) drop-shadow(0 0 80px rgba(200,80,0,0.4));
      position: relative;
      letter-spacing: 0.04em;
    }

    .title-main::after {
      content: 'SOLARIS BREACH';
      position: absolute;
      top: 0; left: 0;
      background: linear-gradient(
        180deg,
        #fff8e7 0%,
        #f5c842 30%,
        #e8820a 60%,
        #8b2500 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(18px);
      opacity: 0.4;
      z-index: -1;
    }

    .title-tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1vw, 13px);
      letter-spacing: 0.3em;
      color: #9e8060;
      margin-top: 18px;
      font-style: italic;
      animation: fadeIn 3s ease 1s both;
    }

    /* ── MENU ── */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      animation: titleRise 1.8s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both;
    }

    .menu-item {
      font-family: 'Cinzel', serif;
      font-size: clamp(13px, 1.8vw, 22px);
      letter-spacing: 0.25em;
      color: #d4a84b;
      cursor: pointer;
      padding: 10px 40px;
      position: relative;
      transition: color 0.15s, text-shadow 0.15s;
      text-transform: uppercase;
    }

    .menu-item::before {
      content: '▸';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      color: #f5c842;
      transition: opacity 0.15s, left 0.15s;
      font-size: 0.8em;
    }

    .menu-item:hover,
    .menu-item.selected {
      color: #fff8e7;
      text-shadow: 0 0 18px rgba(245,200,66,0.8), 0 0 40px rgba(240,130,10,0.5);
    }

    .menu-item:hover::before,
    .menu-item.selected::before {
      opacity: 1;
      left: 4px;
    }

    /* ── BOSS STRIP ── */
    .boss-strip {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: 130px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      animation: fadeIn 3s ease 2s both;
      pointer-events: none;
    }

    .boss-silhouettes {
      display: flex;
      width: 100%;
      align-items: flex-end;
      padding: 0 20px;
      gap: 0;
    }

    /* ── GROUND LINE ── */
    .ground-line {
      position: fixed;
      bottom: 128px;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(200,130,10,0.15) 15%,
        rgba(200,130,10,0.4) 50%,
        rgba(200,130,10,0.15) 85%,
        transparent 100%
      );
      z-index: 2;
    }

    /* ── CORNER DECO ── */
    .corner {
      position: fixed;
      z-index: 3;
      opacity: 0.35;
      font-size: 48px;
      color: #c8860a;
      font-family: 'Cinzel Decorative', serif;
      line-height: 1;
    }
    .corner-tl { top: 20px; left: 24px; }
    .corner-tr { top: 20px; right: 24px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 24px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 24px; transform: scale(-1,-1); }

    /* ── VERSION / FOOTER ── */
    .footer-txt {
      position: fixed;
      bottom: 14px;
      width: 100%;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(180,130,60,0.4);
      z-index: 3;
      text-transform: uppercase;
    }

    /* ── FLICKER ── */
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.4; }
      94% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
    }

    .title-main { animation: titleRise 2.2s cubic-bezier(0.16,1,0.3,1) both, flicker 8s ease 4s infinite; }

    /* ── AUDIO PROMPT ── */
    #audio-prompt {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #audio-prompt .press-key {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(18px, 3vw, 36px);
      color: #f5c842;
      letter-spacing: 0.15em;
      text-align: center;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 30px rgba(245,200,66,0.6);
    }

    #audio-prompt .sub-press {
      font-family: 'Cinzel', serif;
      font-size: clamp(10px, 1.2vw, 14px);
      color: rgba(200,160,80,0.6);
      letter-spacing: 0.4em;
      margin-top: 20px;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.97); }
    }

    /* ── CUSTOM CURSOR ── */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      border: 2px solid #f5c842;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      box-shadow: 0 0 8px rgba(245,200,66,0.6);
    }

    /* ── SCAN LINE OVERLAY ── */
    .scanlines {
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }
  </style>
</head>
<body>

<!-- Audio click-to-start prompt -->
<div id="audio-prompt">
  <div class="press-key">PRESS ANY KEY TO BEGIN</div>
  <div class="sub-press">solaris breach · v0.1</div>
</div>

<!-- Background canvas (stars, nebula) -->
<canvas id="bg-canvas"></canvas>
<!-- Foreground canvas (character, particles) -->
<canvas id="game-canvas"></canvas>

<!-- Scanlines -->
<div class="scanlines"></div>

<!-- Corner decorations -->
<div class="corner corner-tl">⌒</div>
<div class="corner corner-tr">⌒</div>
<div class="corner corner-bl">⌒</div>
<div class="corner corner-br">⌒</div>

<!-- Main UI -->
<div id="ui">
  <div class="title-block">
    <div class="title-sub">A Boss Rush Through a Dying Star System</div>
    <div class="title-main">SOLARIS BREACH</div>
    <div class="title-tagline">"The Sun remembers what you've done."</div>
  </div>

  <nav class="menu" id="menu">
    <div class="menu-item selected" data-idx="0">New Journey</div>
    <div class="menu-item" data-idx="1">Continue</div>
    <div class="menu-item" data-idx="2">Lore Archive</div>
    <div class="menu-item" data-idx="3">Settings</div>
  </nav>
</div>

<!-- Boss silhouettes strip -->
<div class="boss-strip">
  <canvas id="boss-canvas" style="width:100%;height:130px;"></canvas>
</div>
<div class="ground-line"></div>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Footer -->
<div class="footer-txt">Solaris Breach &nbsp;·&nbsp; v0.1 Alpha &nbsp;·&nbsp; 11 Bosses &nbsp;·&nbsp; One Reckoning</div>

<script>
// ═══════════════════════════════════════
//  AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let started = false;

function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 3);
  masterGain.connect(audioCtx.destination);

  // Deep drone layer
  playDrone(27.5, 0.25, 'sine');     // A0
  playDrone(55,   0.18, 'sine');     // A1
  playDrone(82.4, 0.08, 'triangle');// E2
  playDrone(110,  0.05, 'sine');     // A2

  // Reverb pad
  playPad();

  // Melodic arpeggio (slow, ethereal)
  playArpeggio();

  // Subtle percussion
  playPercussion();
}

function playDrone(freq, gain, type) {
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  const lfo = audioCtx.createOscillator();
  const lfoG= audioCtx.createGain();

  lfo.frequency.value = 0.07 + Math.random()*0.05;
  lfoG.gain.value = freq * 0.003;
  lfo.connect(lfoG);
  lfoG.connect(osc.frequency);
  lfo.start();

  osc.type = type;
  osc.frequency.value = freq;
  g.gain.value = gain;
  osc.connect(g);
  g.connect(masterGain);
  osc.start();
}

function playPad() {
  const notes = [110, 138.6, 164.8, 220, 261.6, 329.6];
  notes.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600;
    filter.Q.value = 1.2;

    osc.type = 'sawtooth';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 4 + i*0.5);

    osc.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    osc.start();
  });
}

function playArpeggio() {
  const scale = [220, 246.9, 261.6, 293.7, 329.6, 369.9, 392, 440, 493.9, 523.3];
  let idx = 0;
  let step = 0;
  const pattern = [0,2,4,7,4,2,0,5,3,1,0];

  function scheduleNote(time) {
    const note = scale[pattern[idx % pattern.length] % scale.length] / 2;
    idx++;

    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = note * 2;
    filter.Q.value = 2;

    osc.type = 'sine';
    osc.frequency.value = note;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(0.06, time + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, time + 1.8);

    osc.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    osc.start(time);
    osc.stop(time + 2);

    step++;
    const interval = (step % 4 === 0) ? 1.6 : 0.8;
    setTimeout(() => scheduleNote(audioCtx.currentTime + 0.01), interval * 800);
  }

  setTimeout(() => scheduleNote(audioCtx.currentTime), 2000);
}

function playPercussion() {
  function kick(time) {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.frequency.setValueAtTime(60, time);
    osc.frequency.exponentialRampToValueAtTime(20, time + 0.3);
    g.gain.setValueAtTime(0.3, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + 0.5);
  }

  function shimmer(time) {
    const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const src = audioCtx.createBufferSource();
    const g   = audioCtx.createGain();
    const f   = audioCtx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 6000;
    src.buffer = buf;
    g.gain.setValueAtTime(0.04, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(time);
  }

  let t = audioCtx.currentTime + 4;
  const BPM = 60;
  const beat = 60/BPM;

  function schedule() {
    // 4/4 kick pattern: 1 and 3
    kick(t);
    shimmer(t + beat);
    kick(t + beat*2);
    shimmer(t + beat*3);
    shimmer(t + beat*3.5);
    t += beat*4;
    setTimeout(schedule, beat*4*1000 - 50);
  }
  setTimeout(schedule, 3800);
}

// ═══════════════════════════════════════
//  BACKGROUND CANVAS (Stars + Nebula)
// ═══════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');

function resizeCanvases() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  gcCanvas.width  = window.innerWidth;
  gcCanvas.height = window.innerHeight;
  bossCanvas.width  = window.innerWidth;
  bossCanvas.height = 130;
}

// Stars
const stars = Array.from({length: 340}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.8 + 0.2,
  twinkleSpeed: Math.random() * 0.02 + 0.005,
  twinklePhase: Math.random() * Math.PI * 2,
  color: Math.random() < 0.15
    ? `hsl(${30+Math.random()*30},80%,80%)`
    : `hsl(${200+Math.random()*60},${20+Math.random()*40}%,${70+Math.random()*30}%)`
}));

// Nebula blobs
const nebulae = [
  { x:0.15, y:0.3,  rx:0.25, ry:0.18, col:'rgba(180,60,10,', a:0.07 },
  { x:0.75, y:0.2,  rx:0.22, ry:0.15, col:'rgba(10,40,180,', a:0.05 },
  { x:0.5,  y:0.65, rx:0.35, ry:0.12, col:'rgba(120,30,160,', a:0.06 },
  { x:0.88, y:0.6,  rx:0.18, ry:0.20, col:'rgba(200,120,10,', a:0.05 },
];

function drawBg(t) {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0,0,W,H);

  // Deep space gradient
  const grad = bgCtx.createRadialGradient(W*0.5, H*0.35, 0, W*0.5, H*0.5, W*0.8);
  grad.addColorStop(0,   '#0a0612');
  grad.addColorStop(0.4, '#060309');
  grad.addColorStop(1,   '#000000');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0,0,W,H);

  // Nebulae
  nebulae.forEach(n => {
    const pulse = 1 + Math.sin(t*0.0003 + n.x*10)*0.08;
    const grd = bgCtx.createRadialGradient(
      n.x*W, n.y*H, 0,
      n.x*W, n.y*H, n.rx*W*pulse
    );
    grd.addColorStop(0, n.col + (n.a*1.5) + ')');
    grd.addColorStop(1, n.col + '0)');
    bgCtx.fillStyle = grd;
    bgCtx.beginPath();
    bgCtx.ellipse(n.x*W, n.y*H, n.rx*W*pulse, n.ry*H*pulse, 0, 0, Math.PI*2);
    bgCtx.fill();
  });

  // Distant sun (upper right glow)
  const sunX = W*0.82, sunY = H*0.12;
  const sunR = bgCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, W*0.4);
  sunR.addColorStop(0, 'rgba(255,240,180,0.9)');
  sunR.addColorStop(0.02,'rgba(255,160,30,0.6)');
  sunR.addColorStop(0.08,'rgba(200,80,10,0.25)');
  sunR.addColorStop(0.2, 'rgba(160,40,0,0.08)');
  sunR.addColorStop(1,   'rgba(0,0,0,0)');
  bgCtx.fillStyle = sunR;
  bgCtx.beginPath();
  bgCtx.ellipse(sunX, sunY, W*0.4, W*0.4, 0, 0, Math.PI*2);
  bgCtx.fill();

  // Stars
  stars.forEach(s => {
    const brightness = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase);
    bgCtx.globalAlpha = 0.3 + brightness * 0.7;
    bgCtx.fillStyle = s.color;
    bgCtx.beginPath();
    bgCtx.arc(s.x*W, s.y*H, s.r * (0.8 + brightness*0.4), 0, Math.PI*2);
    bgCtx.fill();
  });
  bgCtx.globalAlpha = 1;
}

// ═══════════════════════════════════════
//  GAME CANVAS (Character + Particles)
// ═══════════════════════════════════════
const gcCanvas = document.getElementById('game-canvas');
const gcCtx    = gcCanvas.getContext('2d');

// Particles
const particles = [];
function spawnParticle(x, y, vx, vy, life, col, r) {
  particles.push({ x,y,vx,vy,life,maxLife:life,col,r });
}

// Character (pixel silhouette drawn with canvas primitives)
const char = {
  x: 0, y: 0,
  bobPhase: Math.random() * Math.PI * 2,
  capePhase: 0,
  glowPulse: 0
};

function drawCharacter(t) {
  const W = gcCanvas.width, H = gcCanvas.height;
  const cx = W * 0.5;
  const cy = H * 0.74 + Math.sin(t * 0.0018 + char.bobPhase) * 6;

  char.x = cx; char.y = cy;

  const scale = Math.min(W, H) / 700;

  // Emit particles from feet / cape
  if (Math.random() < 0.3) {
    spawnParticle(
      cx + (Math.random()-0.5)*20*scale,
      cy + 38*scale,
      (Math.random()-0.5)*0.4,
      -(Math.random()*0.5+0.2),
      40 + Math.random()*40,
      `hsl(${30+Math.random()*20},90%,60%)`,
      Math.random()*2+1
    );
  }
  if (Math.random() < 0.2) {
    const side = Math.random() < 0.5 ? -1 : 1;
    spawnParticle(
      cx + side*14*scale + (Math.random()-0.5)*8*scale,
      cy + (Math.random()-0.5)*20*scale,
      side*0.6+Math.random()*0.3,
      (Math.random()-0.5)*0.3,
      60,
      `hsl(${220+Math.random()*40},80%,70%)`,
      Math.random()*1.5+0.5
    );
  }

  gcCtx.save();
  gcCtx.translate(cx, cy);
  gcCtx.scale(scale, scale);

  // Cape (animated)
  char.capePhase += 0.03;
  const capeWave = Math.sin(char.capePhase) * 8;
  gcCtx.save();
  gcCtx.beginPath();
  gcCtx.moveTo(-10, -30);
  gcCtx.bezierCurveTo(-22, 0, -28+capeWave, 20, -18+capeWave*0.5, 45);
  gcCtx.bezierCurveTo(-8, 50, 0, 40, 4, 30);
  gcCtx.lineTo(0, -20);
  gcCtx.closePath();
  const capeGrad = gcCtx.createLinearGradient(-28, -30, 0, 50);
  capeGrad.addColorStop(0, 'rgba(40,20,80,0.9)');
  capeGrad.addColorStop(1, 'rgba(80,20,120,0.3)');
  gcCtx.fillStyle = capeGrad;
  gcCtx.fill();
  gcCtx.restore();

  // Body glow
  char.glowPulse += 0.04;
  const gp = 0.7 + 0.3 * Math.sin(char.glowPulse);
  const bodyGlow = gcCtx.createRadialGradient(0, 0, 0, 0, 0, 50);
  bodyGlow.addColorStop(0, `rgba(255,200,60,${0.15*gp})`);
  bodyGlow.addColorStop(1, 'rgba(0,0,0,0)');
  gcCtx.fillStyle = bodyGlow;
  gcCtx.beginPath();
  gcCtx.arc(0, 0, 50, 0, Math.PI*2);
  gcCtx.fill();

  // Legs
  gcCtx.fillStyle = '#1a0a2e';
  gcCtx.fillRect(-8, 20, 7, 22);
  gcCtx.fillRect(1,  20, 7, 22);
  // Boots
  gcCtx.fillStyle = '#0d0819';
  gcCtx.fillRect(-10, 38, 10, 6);
  gcCtx.fillRect(-1,  38, 10, 6);

  // Torso
  const torsoGrad = gcCtx.createLinearGradient(-10,-30,10,20);
  torsoGrad.addColorStop(0,'#2a1050');
  torsoGrad.addColorStop(1,'#180830');
  gcCtx.fillStyle = torsoGrad;
  gcCtx.beginPath();
  gcCtx.roundRect(-11,-28, 22, 50, 3);
  gcCtx.fill();

  // Chest emblem (sun sigil)
  gcCtx.fillStyle = `rgba(255,180,40,${0.8*gp})`;
  gcCtx.beginPath();
  gcCtx.arc(0, -8, 5, 0, Math.PI*2);
  gcCtx.fill();
  for (let i=0;i<8;i++){
    const a = (i/8)*Math.PI*2;
    gcCtx.beginPath();
    gcCtx.moveTo(Math.cos(a)*6, Math.sin(a)*6 - 8);
    gcCtx.lineTo(Math.cos(a)*9, Math.sin(a)*9 - 8);
    gcCtx.strokeStyle = `rgba(255,200,80,${0.6*gp})`;
    gcCtx.lineWidth = 1.2;
    gcCtx.stroke();
  }

  // Shoulders / pauldrons
  gcCtx.fillStyle = '#0d0819';
  gcCtx.beginPath(); gcCtx.ellipse(-13,-18,7,5,0.3,0,Math.PI*2); gcCtx.fill();
  gcCtx.beginPath(); gcCtx.ellipse(13,-18,7,5,-0.3,0,Math.PI*2); gcCtx.fill();
  // Shoulder glow
  gcCtx.fillStyle = `rgba(100,40,200,${0.4*gp})`;
  gcCtx.beginPath(); gcCtx.ellipse(-13,-18,4,3,0.3,0,Math.PI*2); gcCtx.fill();
  gcCtx.beginPath(); gcCtx.ellipse(13,-18,4,3,-0.3,0,Math.PI*2); gcCtx.fill();

  // Neck / head
  gcCtx.fillStyle = '#c8a060';
  gcCtx.fillRect(-3,-35,6,8);

  // Head
  gcCtx.fillStyle = '#1a0a2e';
  gcCtx.beginPath();
  gcCtx.ellipse(0,-46,12,14,0,0,Math.PI*2);
  gcCtx.fill();

  // Helmet visor
  const visorGrad = gcCtx.createLinearGradient(-8,-52,8,-38);
  visorGrad.addColorStop(0, `rgba(255,200,80,${0.9*gp})`);
  visorGrad.addColorStop(1, `rgba(200,100,20,${0.6*gp})`);
  gcCtx.fillStyle = visorGrad;
  gcCtx.beginPath();
  gcCtx.ellipse(0,-46,7,5,0,0,Math.PI*2);
  gcCtx.fill();

  // Helmet horns
  gcCtx.fillStyle = '#0d0819';
  gcCtx.beginPath();
  gcCtx.moveTo(-8,-56); gcCtx.lineTo(-14,-68); gcCtx.lineTo(-4,-58);
  gcCtx.fill();
  gcCtx.beginPath();
  gcCtx.moveTo(8,-56); gcCtx.lineTo(14,-68); gcCtx.lineTo(4,-58);
  gcCtx.fill();

  // Sword (right hand, slight angle)
  gcCtx.save();
  gcCtx.translate(18,-5);
  gcCtx.rotate(0.25 + Math.sin(t*0.001)*0.05);
  // Blade
  const bladeGrad = gcCtx.createLinearGradient(-2,0,2,50);
  bladeGrad.addColorStop(0,`rgba(255,220,100,${gp})`);
  bladeGrad.addColorStop(0.5,'rgba(180,80,20,0.9)');
  bladeGrad.addColorStop(1,'rgba(60,20,10,0.7)');
  gcCtx.fillStyle = bladeGrad;
  gcCtx.beginPath();
  gcCtx.moveTo(-2,0); gcCtx.lineTo(2,0); gcCtx.lineTo(0.5,52); gcCtx.lineTo(-0.5,52);
  gcCtx.fill();
  // Guard
  gcCtx.fillStyle = '#a06020';
  gcCtx.fillRect(-6,-2,12,4);
  // Handle
  gcCtx.fillStyle = '#3a1a08';
  gcCtx.fillRect(-2,2,4,16);
  gcCtx.restore();

  gcCtx.restore();
}

function drawParticles() {
  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    const alpha = p.life / p.maxLife;
    gcCtx.globalAlpha = alpha * 0.8;
    gcCtx.fillStyle = p.col;
    gcCtx.beginPath();
    gcCtx.arc(p.x, p.y, p.r * alpha, 0, Math.PI*2);
    gcCtx.fill();
  }
  gcCtx.globalAlpha = 1;
}

// ═══════════════════════════════════════
//  BOSS SILHOUETTES
// ═══════════════════════════════════════
const bossCanvas  = document.getElementById('boss-canvas');
const bossCtx     = bossCanvas.getContext('2d');

const BOSSES = [
  { name:'Ignis, Warden of Mercury', shape:'spike-ball', x:0.06  },
  { name:'Venosia, the Cloud Serpent', shape:'serpent',   x:0.14  },
  { name:'Solmaar, the Scorched Titan', shape:'titan',    x:0.22  },
  { name:'The Rift Twins',             shape:'twins',     x:0.32  },
  { name:'Aurelion, Beltkeeper',       shape:'ring',      x:0.42  },
  { name:'Saturnex',                   shape:'ringed',    x:0.52  },
  { name:'Colossus of Ice',            shape:'colossus',  x:0.62  },
  { name:'The Void Eel',               shape:'eel',       x:0.71  },
  { name:'Neptunar',                   shape:'leviathan', x:0.8   },
  { name:'Kuiper, the Last Edge',      shape:'shard',     x:0.88  },
  { name:'HELIOS PRIME (Final Boss)',  shape:'sun',       x:0.5, isFinal:true },
];

function drawBossShape(ctx, boss, t, W, H) {
  const x = boss.x * W;
  const baseY = H;
  const s = boss.isFinal ? 2.2 : 1;
  ctx.save();
  ctx.translate(x, baseY);
  const hover = Math.sin(t*0.001 + boss.x*10)*3*s;
  ctx.translate(0, hover - (boss.isFinal ? 260 : 0));

  const alpha = boss.isFinal ? 0 : 0.55; // final boss hidden (tease only for strip)
  ctx.globalAlpha = boss.isFinal ? 0 : 0.55;

  const silCol = boss.isFinal
    ? `rgba(255,100,10,0.9)`
    : `rgba(20,8,40,0.85)`;

  ctx.fillStyle = silCol;
  ctx.shadowColor = boss.isFinal ? 'rgba(255,100,10,0.6)' : 'rgba(100,40,200,0.3)';
  ctx.shadowBlur = 18 * s;

  const sz = (50 + (boss.isFinal?80:0)) * s;

  switch(boss.shape) {
    case 'spike-ball':
      ctx.beginPath(); ctx.arc(0,-sz*0.6,sz*0.4,0,Math.PI*2); ctx.fill();
      for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*sz*0.4,Math.sin(a)*sz*0.4-sz*0.6); ctx.lineTo(Math.cos(a)*sz*0.7,Math.sin(a)*sz*0.7-sz*0.6); ctx.strokeStyle=silCol; ctx.lineWidth=3; ctx.stroke();}
      break;
    case 'serpent':
      for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(Math.sin(i*0.8)*20,-sz*0.15*i,12,10,Math.sin(i)*0.5,0,Math.PI*2);ctx.fill();}
      break;
    case 'titan':
      ctx.beginPath();ctx.roundRect(-sz*0.3,-sz,sz*0.6,sz,[4]);ctx.fill();
      ctx.beginPath();ctx.ellipse(0,-sz,sz*0.25,sz*0.2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-sz*0.4,-sz*0.6,sz*0.15,sz*0.08,0.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(sz*0.4,-sz*0.6,sz*0.15,sz*0.08,-0.5,0,Math.PI*2);ctx.fill();
      break;
    case 'twins':
      ctx.beginPath();ctx.ellipse(-sz*0.4,-sz*0.5,sz*0.22,sz*0.35,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(sz*0.4,-sz*0.5,sz*0.22,sz*0.35,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=silCol;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-sz*0.18,-sz*0.5);ctx.lineTo(sz*0.18,-sz*0.5);ctx.stroke();
      break;
    case 'ring': case 'ringed':
      ctx.beginPath();ctx.arc(0,-sz*0.5,sz*0.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(0,-sz*0.5,sz*0.55,sz*0.12,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0)';ctx.globalCompositeOperation='destination-out';
      ctx.beginPath();ctx.arc(0,-sz*0.5,sz*0.15,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation='source-over';
      break;
    case 'colossus':
      ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*0.35,-sz*0.2);ctx.lineTo(sz*0.2,0);ctx.lineTo(-sz*0.2,0);ctx.lineTo(-sz*0.35,-sz*0.2);ctx.closePath();ctx.fill();
      break;
    case 'eel':
      for(let i=0;i<8;i++){const a=Math.sin(i*0.6)*30;ctx.beginPath();ctx.ellipse(a,-i*sz*0.14,16-i,9-i,0,0,Math.PI*2);ctx.fill();}
      break;
    case 'leviathan':
      ctx.beginPath();ctx.ellipse(0,-sz*0.4,sz*0.5,sz*0.25,0,0,Math.PI*2);ctx.fill();
      for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse((i-1.5)*sz*0.22,-sz*0.05,sz*0.08,sz*0.18,0,0,Math.PI*2);ctx.fill();}
      break;
    case 'shard':
      ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*0.15,-sz*0.3);ctx.lineTo(sz*0.4,0);ctx.lineTo(-sz*0.4,0);ctx.lineTo(-sz*0.15,-sz*0.3);ctx.closePath();ctx.fill();
      break;
    case 'sun':
      // Not drawn in strip (final boss stays hidden)
      break;
  }
  ctx.restore();
}

function drawBossStrip(t) {
  const W = bossCanvas.width, H = bossCanvas.height;
  bossCtx.clearRect(0,0,W,H);

  // Ground fog
  const fog = bossCtx.createLinearGradient(0,H*0.5,0,H);
  fog.addColorStop(0,'rgba(10,4,24,0)');
  fog.addColorStop(1,'rgba(10,4,24,0.7)');
  bossCtx.fillStyle=fog;
  bossCtx.fillRect(0,0,W,H);

  BOSSES.filter(b=>!b.isFinal).forEach(b => drawBossShape(bossCtx,b,t,W,H));
}

// ═══════════════════════════════════════
//  MENU LOGIC
// ═══════════════════════════════════════
const menuItems = document.querySelectorAll('.menu-item');
let selectedIdx = 0;

menuItems.forEach(item => {
  item.addEventListener('mouseenter', () => {
    menuItems[selectedIdx].classList.remove('selected');
    selectedIdx = parseInt(item.dataset.idx);
    item.classList.add('selected');
  });
  item.addEventListener('click', () => {
    // Flash effect on click
    item.style.color = '#fff';
    setTimeout(()=>item.style.color='',200);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 's') {
    menuItems[selectedIdx].classList.remove('selected');
    selectedIdx = (selectedIdx + 1) % menuItems.length;
    menuItems[selectedIdx].classList.add('selected');
  }
  if (e.key === 'ArrowUp' || e.key === 'w') {
    menuItems[selectedIdx].classList.remove('selected');
    selectedIdx = (selectedIdx - 1 + menuItems.length) % menuItems.length;
    menuItems[selectedIdx].classList.add('selected');
  }
});

// ═══════════════════════════════════════
//  CUSTOM CURSOR
// ═══════════════════════════════════════
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ═══════════════════════════════════════
//  AUDIO PROMPT / START
// ═══════════════════════════════════════
const audioPrompt = document.getElementById('audio-prompt');

function beginGame() {
  if (started) return;
  started = true;
  audioPrompt.style.transition = 'opacity 0.8s';
  audioPrompt.style.opacity = '0';
  setTimeout(() => audioPrompt.style.display = 'none', 800);
  startAudio();
}

audioPrompt.addEventListener('click',  beginGame);
document.addEventListener('keydown', e => {
  if (!started) beginGame();
});

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
window.addEventListener('resize', () => resizeCanvases());
resizeCanvases();

let lastT = 0;
function loop(t) {
  drawBg(t);
  gcCtx.clearRect(0,0,gcCanvas.width,gcCanvas.height);
  drawCharacter(t);
  drawParticles();
  drawBossStrip(t);
  lastT = t;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
